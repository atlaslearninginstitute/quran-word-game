<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quranic Words Journey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  /* palette modeled on quran.com: teal accent, white surfaces, hairline borders */
  --bg:#e9f3f2; --card:#ffffff; --card2:#f4f8f8; --line:#dfe8e8;
  --gold:#2ca4ab; --gold2:#14666c; --arab:#1f2937;
  --ink:#1f2430; --mut:#6b7280;
  --good:#1c8a55; --goodbg:#e9f7f0; --bad:#d64550; --badbg:#fdecee;
  --teal:#2ca4ab; --star:#e3a008;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
body{
  margin:0; font-family:'Inter',system-ui,sans-serif; color:var(--ink);
  background:var(--bg);
  min-height:100vh;
}
.ar{font-family:'Amiri',serif; direction:rtl}
#wrap{max-width:560px; margin:0 auto; padding:0 14px 60px}
header{
  position:sticky; top:10px; z-index:10; display:flex; justify-content:space-between; align-items:center;
  flex-wrap:wrap; gap:8px; margin:14px 0 6px; padding:16px 18px; border-radius:16px;
  background:linear-gradient(135deg,#14707f,#2ca4ab);
  box-shadow:0 4px 14px rgba(20,112,127,.28);
}
header .brand{font-weight:800; font-size:18px; color:#ffffff; letter-spacing:.4px}
header .stats{display:flex; gap:8px; font-weight:800; font-size:13px}
header .stats span{
  display:inline-flex; align-items:center; gap:6px;
  background:var(--card); padding:5px 11px; border-radius:20px;
  border:1px solid var(--line); box-shadow:0 1px 3px rgba(16,24,40,.07);
}
h1{font-size:22px; margin:20px 0 4px}
.sub{color:var(--mut); font-size:14px; margin:0 0 18px; line-height:1.5}
.cres-card{
  background:var(--card); border:1px solid var(--line); border-radius:12px;
  padding:12px 16px; margin:0 0 14px; box-shadow:0 1px 3px rgba(16,24,40,.05);
}
.crescents{font-size:20px; letter-spacing:4px; color:var(--star); margin:4px 0 2px; min-height:26px}
.cresbar{height:6px; background:#e5eaec; border-radius:3px; overflow:hidden; margin:7px 0 6px}
.cresbar i{display:block; height:100%; background:var(--star); border-radius:3px}
.cres-txt{font-size:12px; color:var(--mut)}

/* map */
.map{display:flex; flex-direction:column; gap:10px}
.node{
  display:flex; align-items:center; gap:14px; background:var(--card);
  border:1px solid var(--line); border-radius:16px; padding:13px 16px; cursor:pointer;
  transition:transform .12s, border-color .12s; box-shadow:0 1px 4px rgba(16,24,40,.07);
}
.node:not(.locked):hover{transform:translateX(4px); border-color:var(--gold)}
.node.locked{opacity:.55; cursor:pointer; box-shadow:none}
.node .num{
  width:42px; height:42px; flex:0 0 42px; border-radius:50%;
  background:var(--card2); border:2px solid var(--gold);
  display:flex; align-items:center; justify-content:center; font-weight:800; color:var(--gold2);
}
.node.locked .num{border-color:#d3dadd; color:var(--mut)}
.node.review .num{border-style:dashed}
.node .info{flex:1}
.node .t{font-weight:800; font-size:15px}
.node .d{color:var(--mut); font-size:12.5px}
.node .stars{font-size:13px; letter-spacing:1px; font-weight:800}
.revbtn{
  margin:16px 0 0; width:100%; background:#eef7f8;
  border:1px solid var(--teal); color:var(--gold2); font-weight:700; font-size:15px;
  padding:14px; border-radius:12px; cursor:pointer; font-family:inherit; transition:background .12s;
}
.revbtn:hover{background:#e2f1f2}
.howto{
  background:var(--card); border:1px solid var(--line); border-radius:12px;
  padding:4px 18px 8px; margin:0 0 16px; font-size:13.5px; line-height:1.6;
  box-shadow:0 1px 3px rgba(16,24,40,.05);
}
.howto summary{font-weight:700; cursor:pointer; color:var(--ink); font-size:14px; padding:11px 0}
.howto summary::marker{color:var(--teal)}
.hsec{padding:11px 0; border-top:1px solid var(--line)}
.hlabel{
  font-size:11px; letter-spacing:1.1px; text-transform:uppercase;
  color:var(--gold2); font-weight:800; margin-bottom:4px;
}
.htxt{color:var(--ink)}
.hpill{
  display:inline-block; background:var(--card2); border:1px solid var(--teal);
  color:var(--gold2); border-radius:16px; padding:1px 10px;
  font-size:11.5px; font-weight:700; margin:5px 4px 1px 0;
}
.hsteps{display:flex; flex-wrap:wrap; gap:5px; margin:6px 0}
.hsteps span{
  background:var(--card2); border:1px solid var(--line); border-radius:8px;
  padding:2px 10px; font-size:12px; font-weight:600; color:var(--ink);
}

/* generic */
.btn{
  display:inline-block; background:var(--teal); color:#ffffff;
  font-weight:700; font-size:15px; border:none; border-radius:24px; padding:13px 28px;
  cursor:pointer; font-family:inherit; margin-top:16px; box-shadow:0 1px 3px rgba(16,24,40,.15);
  transition:background .12s;
}
.btn:hover{background:#238e94}
.btn.ghost{background:var(--card); color:var(--ink); border:1px solid var(--line); box-shadow:none}
.btn.ghost:hover{background:var(--card2)}
.btn:disabled{opacity:.4; cursor:not-allowed}
.topline{display:flex; align-items:center; justify-content:space-between; margin:18px 0 6px}
.topline .back{
  display:inline-flex; align-items:center; gap:6px; background:var(--card);
  border:1px solid var(--line); border-radius:20px; padding:6px 14px;
  color:var(--gold2); cursor:pointer; font-size:12.5px; font-weight:800;
  box-shadow:0 1px 3px rgba(16,24,40,.06); transition:border-color .12s;
}
.topline .back:hover{border-color:var(--gold)}
.steps-track{display:flex; gap:4px; margin:12px 0 2px}
.stp{
  flex:1; text-align:center; font-size:10.5px; font-weight:700; color:var(--mut);
  padding:4px 1px; border-radius:8px; background:var(--card); border:1px solid var(--line);
  white-space:nowrap; overflow:hidden;
}
.stp.done{color:var(--gold2); border-color:var(--teal); background:#eef7f8}
.stp.cur{background:var(--teal); color:#ffffff; border-color:var(--teal)}
.stage{color:var(--gold2); font-weight:800; font-size:13px; text-transform:uppercase; letter-spacing:1.5px; margin:14px 0 2px}
.q{font-size:16.5px; font-weight:700; margin:8px 0 14px; line-height:1.5}

/* flashcards */
.fc{
  background:var(--card); border:1px solid var(--line); border-radius:20px; padding:34px 20px;
  text-align:center; cursor:pointer; min-height:210px; display:flex; flex-direction:column; justify-content:center;
  box-shadow:0 2px 8px rgba(16,24,40,.09);
}
.fc .arw{font-size:46px; line-height:1.6; color:var(--arab)}
.fc .mean{font-size:19px; font-weight:800; margin-top:8px}
.fc .times{color:var(--mut); font-size:13px; margin-top:10px}
.fc .hint{color:var(--mut); font-size:12.5px; margin-top:14px}
.fcnav{display:flex; justify-content:space-between; align-items:center; margin-top:14px}
.fcnav .cnt{color:var(--mut); font-weight:700}

/* match */
.mgrid{display:grid; grid-template-columns:1fr 1fr; gap:9px}
.mcell{
  background:var(--card); border:1px solid var(--line); border-radius:13px; padding:13px 8px;
  text-align:center; cursor:pointer; font-weight:700; font-size:14.5px; min-height:58px;
  display:flex; align-items:center; justify-content:center; transition:all .12s;
  box-shadow:0 1px 3px rgba(16,24,40,.06);
}
.mcell.ar{font-size:24px; color:var(--arab)}
.mcell.sel{border-color:var(--gold); background:var(--card2); transform:scale(.97)}
.mcell.done{opacity:.15; pointer-events:none}
.mcell.err{border-color:var(--bad); animation:shake .3s}

/* choice */
.opts{display:flex; flex-direction:column; gap:9px}
.opt{
  background:var(--card); border:1px solid var(--line); border-radius:13px; padding:14px 16px;
  cursor:pointer; font-weight:700; font-size:15px; text-align:left; transition:all .12s; font-family:inherit; color:var(--ink);
  box-shadow:0 1px 3px rgba(16,24,40,.06);
}
.opt.ar{text-align:right; font-size:26px; color:var(--arab)}
.opt:hover{border-color:var(--gold)}
.opt.good{border-color:var(--good); background:var(--goodbg)}
.opt.bad{border-color:var(--bad); background:var(--badbg); animation:shake .3s}
.bigar{font-size:44px; text-align:center; color:var(--arab); margin:6px 0 16px}
.timerbar{height:6px; background:#e5eaec; border-radius:3px; margin:10px 0 16px; overflow:hidden}
.timerbar i{display:block; height:100%; background:var(--teal); border-radius:3px}

/* ayah builder */
.slots,.pool{display:flex; flex-wrap:wrap; gap:8px; direction:rtl; justify-content:center}
.slots{min-height:64px; background:var(--card2); border:1px dashed #c2ced2; border-radius:12px; padding:12px; margin-bottom:14px}
.chip{
  background:#eef7f8; border:1px solid var(--teal); color:var(--gold2);
  border-radius:10px; padding:7px 13px; font-size:26px; cursor:pointer; font-family:'Amiri',serif;
}
.pool .chip{border-color:#ccd5d9; color:var(--arab); background:var(--card)}
.ayah-res{margin-top:14px; padding:14px; border-radius:13px; font-size:15px; line-height:1.55}
.ayah-res.good{background:var(--goodbg); border:1px solid var(--good)}
.ayah-res.bad{background:var(--badbg); border:1px solid var(--bad)}
.ref{color:var(--mut); font-size:12.5px}

/* feedback + end */
.float{
  position:fixed; left:50%; transform:translateX(-50%); bottom:120px; font-weight:800;
  font-size:20px; color:var(--gold2); pointer-events:none; animation:rise 1.1s forwards; z-index:50;
}
@keyframes rise{from{opacity:1; bottom:120px} to{opacity:0; bottom:200px}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.end{
  text-align:center; background:var(--card); border:1px solid var(--gold); border-radius:22px; padding:36px 20px; margin-top:24px;
  box-shadow:0 3px 12px rgba(16,24,40,.12);
}
.end .big{font-size:44px; letter-spacing:6px; color:var(--star)}
.crescents{color:var(--star); font-size:22px}
.end h2{margin:12px 0 4px}
.end .gain{color:var(--gold2); font-weight:800; font-size:18px}
.note{color:var(--mut); font-size:12px; margin-top:26px; line-height:1.6; text-align:center}
.note a{color:var(--mut)}
</style>
</head>

/* ================= STATE ================= */
const KEY="qwg-save-v1";
let S=null;
try{S=JSON.parse(localStorage.getItem(KEY))}catch(e){}
if(!S) S={thawab:0,stars:{},words:{},lastDay:null,dayStreak:0};
function save(){localStorage.setItem(KEY,JSON.stringify(S))}
function today(){return new Date().toISOString().slice(0,10)}
(function daily(){
  const t=today();
  if(S.lastDay!==t){
    const y=new Date(Date.now()-864e5).toISOString().slice(0,10);
    S.dayStreak=(S.lastDay===y)?S.dayStreak+1:1;
    S.lastDay=t; save();
  }
})();

/* ================= HELPERS ================= */
const app=document.getElementById("app");
const shuffle=a=>{a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a};
const esc=s=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;");
const ICON_STAR='<svg width="13" height="13" viewBox="0 0 24 24" fill="#e3a008" aria-hidden="true"><path d="M12 2l2.9 6.3 6.9.8-5.1 4.7 1.4 6.8L12 17.3 5.9 20.6l1.4-6.8L2.2 9.1l6.9-.8z"/></svg>';
const ICON_CAL='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#2ca4ab" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 11h18M9 15.5l2 2 3.5-3.5"/></svg>';
function header(){
  document.getElementById("hThawab").innerHTML=ICON_STAR+"Thawab: "+S.thawab;
  document.getElementById("hStreak").innerHTML=ICON_CAL+"Day streak: "+S.dayStreak;
}
function gain(n,msg){
  S.thawab+=n; save(); header();
  const el=document.createElement("div"); el.className="float";
  el.textContent=(msg||"")+" +"+n+" thawab"; document.body.appendChild(el);
  setTimeout(()=>el.remove(),1100);
}
function wordStat(ar){ if(!S.words[ar]) S.words[ar]={c:0,w:0}; return S.words[ar]; }
function markWord(ar,ok){ const st=wordStat(ar); ok?st.c++:st.w++; save(); }
function unlockedUpTo(){ let m=1; for(let i=1;i<=20;i++){ if(S.stars[i]) m=i+1; else break; } m=Math.min(m,20); return Math.max(m, S.unlockedTo||1); }
function poolUpTo(n){ let p=[]; LESSONS.forEach(L=>{ if(L.n<=n) p=p.concat(L.words); }); return p; }

/* Session for a lesson run */
let sess=null;

/* ================= MAP ================= */
function renderMap(){
  header();
  const maxOpen=unlockedUpTo();
  const lit=Math.min(12,Math.floor(S.thawab/500));
  const into=S.thawab%500, pct=Math.round(into/5);
  const QURAN_WORDS=77000;
  const occ=LESSONS.filter(L=>S.stars[L.n]||L.n<(S.unlockedTo||1))
    .reduce((s,L)=>s+L.words.reduce((a,w)=>a+(w[2]||0),0),0);
  const covPct=Math.min(100,occ/QURAN_WORDS*100);
  const covText=occ>0

/* ================= LESSON FLOW ================= */
function startLesson(n){
  const L=LESSONS[n-1];
  const steps=[];
  if(L.key) steps.push({name:"Key",run:()=>stepKeyIntro(L)});
  if(L.words.length){
    steps.push({name:"Learn",run:()=>stepLearn(L)});
    steps.push({name:"Match",run:()=>stepMatch(L)});
    steps.push({name:"Quiz",run:()=>stepChoose(L)});
  } else {
    steps.push({name:"Review",run:()=>stepReviewQuiz(L)});
  }
  if(L.ayat&&L.ayat.length){
    steps.push({name:"Read",run:()=>stepAyahRead(L)});
    steps.push({name:"Fill",run:()=>stepAyahBlank(L)});
    steps.push({name:"Build",run:()=>stepAyah(L)});
  }
  steps.push({name:"Boss",run:()=>stepBoss(L)});
  sess={L,steps,idx:0,mistakes:0,earned:0,streak:0};
  nextStep();
}
function nextStep(){
  if(sess.idx>=sess.steps.length){ finishLesson(); return; }
  sess.steps[sess.idx++].run();
}
function topbar(stage){
  const cur=sess.idx-1;
  const track=sess.steps.map((s,i)=>
    `<span class="stp ${i<cur?"done":""} ${i===cur?"cur":""}">${i<cur?"✓ ":""}${s.name}</span>`).join("");
  return `<div class="topline"><span class="back" onclick="renderMap()">← Back to Map</span><span style="color:var(--mut);font-size:12px;font-weight:700">Stage ${cur+1} of ${sess.steps.length}</span></div>
  <div class="steps-track">${track}</div>
  <div class="stage">Lesson ${sess.L.n} · ${stage}</div>`;
}
function award(n,msg){ sess.earned+=n; gain(n,msg); }
function miss(ar){ sess.mistakes++; sess.streak=0; if(ar) markWord(ar,false); }
function hit(ar,base,msg){
  sess.streak++;
  const mult=sess.streak>=6?3:sess.streak>=3?2:1;
  if(ar) markWord(ar,true);
  award(base*mult, mult>1?("x"+mult+" in a row!"):msg||"");
}

/* ---- 1. LEARN (flashcards) ---- */
function stepLearn(L){
  let i=0, flipped=false;
  function draw(){
    const w=L.words[i];
    app.innerHTML=topbar("Learn: tap the card to flip it")+`
    <div class="fc" id="fc">
      <div class="arw ar">${esc(w[0])}</div>
      ${flipped?`<div class="mean">${esc(w[1])}</div>
        <div class="times">${w[2]?("appears about "+w[2]+" times in the Quran"):""}</div>`
        :`<div class="hint">tap to reveal meaning</div>`}
    </div>
    <div class="fcnav">
      <button class="btn ghost" id="pv" ${i===0?"disabled":""}>‹ Back</button>
      <span class="cnt">${i+1} / ${L.words.length}</span>

    </div>`;
    document.getElementById("fc").onclick=()=>{flipped=!flipped;draw()};

/* ---- 2. MATCH (pairs) ---- */
function stepMatch(L){
  const groups=[]; const ws=shuffle(L.words);
  for(let i=0;i<ws.length;i+=5) groups.push(ws.slice(i,i+5));
  let g=0;
  function round(){
    if(g>=groups.length){ nextStep(); return; }
    const pairs=groups[g]; g++;
    if(pairs.length<2){ round(); return; }
    const left=shuffle(pairs.map(p=>({k:p[0],txt:p[0],ar:true})));
    const right=shuffle(pairs.map(p=>({k:p[0],txt:p[1],ar:false})));
    let sel=null, done=0;
    app.innerHTML=topbar("Match the pairs")+`
      <p class="q">Tap an Arabic word, then its meaning.</p><div class="mgrid" id="mg"></div>`;
    const mg=document.getElementById("mg");
    for(let i=0;i<pairs.length;i++){
      [left[i],right[i]].forEach(it=>{
        const c=document.createElement("div");
        c.className="mcell"+(it.ar?" ar":""); c.textContent=it.txt; c.dataset.k=it.k; c.dataset.side=it.ar?"a":"m";
        c.onclick=()=>{
          if(c.classList.contains("done"))return;
          if(sel===c){c.classList.remove("sel");sel=null;return;}
          if(!sel){sel=c;c.classList.add("sel");return;}
          if(sel.dataset.side===c.dataset.side){sel.classList.remove("sel");sel=c;c.classList.add("sel");return;}
          if(sel.dataset.k===c.dataset.k){
            sel.classList.add("done");c.classList.add("done");sel.classList.remove("sel");sel=null;
            hit(c.dataset.k,5); done++;
            if(done===pairs.length) setTimeout(round,450);
          }else{
            c.classList.add("err");sel.classList.add("err");miss(sel.dataset.side==="a"?sel.dataset.k:c.dataset.k);
            const s=sel; sel=null;
            setTimeout(()=>{c.classList.remove("err","sel");s.classList.remove("err","sel")},380);
          }
        };
        mg.appendChild(c);
      });
    }
    window.scrollTo(0,0);
  }
  round();
}

/* ---- MCQ engine ---- */
function mcq(container,word,dirAr2En,pool,onDone,timed){
  const correct=word, others=shuffle(pool.filter(w=>w[0]!==word[0])).slice(0,3);
  const opts=shuffle([correct].concat(others));
  let t=null;
  let h=timed?`<div class="timerbar"><i id="tb" style="width:100%"></i></div>`:"";
  if(dirAr2En){
    h+=`<div class="bigar ar">${esc(word[0])}</div><p class="q" style="text-align:center">What does this mean?</p><div class="opts">`;
    opts.forEach((o,i)=>h+=`<button class="opt" data-i="${i}">${esc(o[1])}</button>`);
  }else{
    h+=`<p class="q" style="text-align:center">Which word means:<br><b style="color:var(--gold2)">${esc(word[1])}</b></p><div class="opts">`;
    opts.forEach((o,i)=>h+=`<button class="opt ar" data-i="${i}">${esc(o[0])}</button>`);
  }
  h+=`</div>`;
  container.innerHTML=h;
  let answered=false;
  function finish(ok){
    if(answered)return; answered=true; if(t)clearInterval(t);
    container.querySelectorAll(".opt").forEach(b=>{
      const o=opts[+b.dataset.i];
      if(o[0]===correct[0]) b.classList.add("good");
      b.style.pointerEvents="none";
    });
    setTimeout(()=>onDone(ok),700);
  }
  container.querySelectorAll(".opt").forEach(b=>{
    b.onclick=()=>{
      const o=opts[+b.dataset.i];
      if(o[0]===correct[0]){ hit(correct[0],10); }
      else { b.classList.add("bad"); miss(correct[0]); }
      finish(o[0]===correct[0]);
    };
  });
  if(timed){
    const bar=container.querySelector("#tb"); let w=100;
    t=setInterval(()=>{ w-=1.25; bar.style.width=Math.max(0,w)+"%";
      if(w<=0){ miss(correct[0]); finish(false); } },150);
  }
}

/* ---- 3. CHOOSE (quiz both directions) ---- */
function stepChoose(L){
  const qs=shuffle(L.words).map((w,i)=>({w,d:i%2===0}));
  let i=0;
  function next(){
    if(i>=qs.length){ nextStep(); return; }
    const q=qs[i++];
    app.innerHTML=topbar(`Quiz question ${i} of ${qs.length}`)+`<div id="qq"></div>`;
    mcq(document.getElementById("qq"),q.w,q.d,poolUpTo(L.n),()=>next(),false);
    window.scrollTo(0,0);
  }
  next();
}

function stepReviewQuiz(L){
  const pool=poolUpTo(L.n-1);
  const qs=shuffle(pool).slice(0,12).map((w,i)=>({w,d:i%2===0}));
  let i=0;
  function next(){
    if(i>=qs.length){ nextStep(); return; }
    const q=qs[i++];
    app.innerHTML=topbar(`Review question ${i} of ${qs.length}`)+`<div id="qq"></div>`;
    mcq(document.getElementById("qq"),q.w,q.d,pool,()=>next(),false);

/* ---- 4. READ THE AYAH: guess the meaning ---- */
const ALL_AYAT=LESSONS.flatMap(L=>L.ayat||[]);
function ayahMcq(stageTitle,promptHtml,options,correct,isArabicOpts,onNext){
  let html=promptHtml+`<div class="opts">`;
  options.forEach((o,ix)=>html+=`<button class="opt${isArabicOpts?" ar":""}" data-i="${ix}">${esc(o)}</button>`);
  html+=`</div>`;
  app.innerHTML=topbar(stageTitle)+html;
  let answered=false;
  document.querySelectorAll(".opt").forEach(b=>{
    b.onclick=()=>{
      if(answered)return; answered=true;
      const ok=options[+b.dataset.i]===correct;
      if(ok) hit(null,10); else { b.classList.add("bad"); miss(null); }
      document.querySelectorAll(".opt").forEach(x=>{ if(options[+x.dataset.i]===correct)x.classList.add("good"); x.style.pointerEvents="none"; });
      setTimeout(onNext, ok?800:1500);
    };
  });
  window.scrollTo(0,0);
}
function stepAyahRead(L){
  let i=0;
  function next(){
    if(i>=L.ayat.length){ nextStep(); return; }
    const A=L.ayat[i++];
    const others=shuffle(ALL_AYAT.filter(x=>x.t!==A.t)).slice(0,3).map(x=>x.t);
    const opts=shuffle([A.t].concat(others));
    const prompt=`<div class="bigar ar" style="font-size:32px;line-height:1.9">${esc(A.a.join(" "))}</div>
      <p class="q" style="text-align:center">Read the ayah aloud, then guess its meaning:</p>`;
    ayahMcq(`Read the Ayah (${i} of ${L.ayat.length})`,prompt,opts,A.t,false,next);
  }
  next();
}

/* ---- 5. FILL IN THE BLANK: with the surah and ayah reference ---- */
function stepAyahBlank(L){
  let i=0;
  function next(){
    if(i>=L.ayat.length){ nextStep(); return; }
    const A=L.ayat[i++];
    const idx=A.a.reduce((b,w,ix)=>w.length>A.a[b].length?ix:b,0);
    const answer=A.a[idx];
    const shown=A.a.map((w,ix)=>ix===idx?"ـــــــ":w).join(" ");
    const pool=[...new Set(ALL_AYAT.flatMap(x=>x.a))].filter(w=>w!==answer);
    const opts=shuffle([answer].concat(shuffle(pool).slice(0,3)));
    const prompt=`<p class="q" style="text-align:center">Which word completes this ayah? You can look it up: <b style="color:var(--gold2)">Quran ${esc(A.r)}</b></p>
      <div class="bigar ar" style="font-size:30px;line-height:1.9">${esc(shown)}</div>
      <p class="q" style="text-align:center;color:var(--mut);font-size:13.5px">“${esc(A.t)}”</p>`;
    ayahMcq(`Fill in the Blank (${i} of ${L.ayat.length})`,prompt,opts,answer,true,next);
  }
  next();
}

/* ---- 6. AYAH BUILDER ---- */
function stepAyah(L){
  let i=0;
  function next(){
    if(i>=L.ayat.length){ nextStep(); return; }
    const A=L.ayat[i++]; buildOne(A,()=>next());
  }
  function buildOne(A,done){
    let tries=0;
    let poolChips=shuffle(A.a);
    if(A.a.length>1){ let guard=0; while(poolChips.join("¦")===A.a.join("¦")&&guard++<10) poolChips=shuffle(A.a); }
    let placed=[];
    function draw(msgHtml){
      app.innerHTML=topbar(`Build the Ayah (${i} of ${L.ayat.length})`)+`
      <p class="q">Arrange the words to form the ayah:<br><b style="color:var(--teal)">“${esc(A.t)}”</b></p>
      <div class="slots" id="slots">${placed.map((w,ix)=>`<span class="chip" data-ix="${ix}">${esc(w)}</span>`).join("")||"<span style='color:var(--mut);font-size:13px;direction:ltr'>tap words below (right to left)</span>"}</div>
      <div class="pool" id="pool">${poolChips.map((w,ix)=>`<span class="chip" data-ix="${ix}">${esc(w)}</span>`).join("")}</div>
      ${msgHtml||""}
      <div style="text-align:center"><button class="btn" id="chk" ${placed.length===A.a.length?"":"disabled"}>Check</button></div>`;
      document.querySelectorAll("#pool .chip").forEach(c=>c.onclick=()=>{
        placed.push(poolChips[+c.dataset.ix]); poolChips.splice(+c.dataset.ix,1); draw();
      });
      document.querySelectorAll("#slots .chip").forEach(c=>c.onclick=()=>{
        poolChips.push(placed[+c.dataset.ix]); placed.splice(+c.dataset.ix,1); draw();
      });
      const chk=document.getElementById("chk");
      if(chk) chk.onclick=()=>{
        if(placed.join("¦")===A.a.join("¦")){
          const pts=tries===0?25:10;
          award(pts,"Ayah!");
          app.innerHTML=topbar("Build the Ayah")+`
            <div class="bigar ar" style="font-size:34px;line-height:1.9">${esc(A.a.join(" "))}</div>
            <div class="ayah-res good">✔ “${esc(A.t)}” <span class="ref">Quran ${esc(A.r)}</span></div>
            <div style="text-align:center"><button class="btn" id="go">Continue ➜</button></div>`;
          document.getElementById("go").onclick=done;
        }else{
          tries++; sess.mistakes++;
          if(tries>=2){
            app.innerHTML=topbar("Build the Ayah")+`
              <div class="bigar ar" style="font-size:34px;line-height:1.9">${esc(A.a.join(" "))}</div>
              <div class="ayah-res bad">The correct order is shown above.<br>“${esc(A.t)}” <span class="ref">Quran ${esc(A.r)}</span></div>
              <div style="text-align:center"><button class="btn" id="go">Continue ➜</button></div>`;
            document.getElementById("go").onclick=done;
          }else{
            poolChips=poolChips.concat(placed); placed=[];
            draw(`<div class="ayah-res bad">Not quite. Try once more!</div>`);
          }
        }
      };
      window.scrollTo(0,0);
    }
    draw();
  }
  next();
}

/* ---- 5. BOSS (timed, includes earlier lessons) ---- */
function stepBoss(L){
  const cur=L.words.length?L.words:poolUpTo(L.n-1);
  const prev=poolUpTo(Math.max(1,L.n-1));
  const qs=shuffle(cur).slice(0,5).concat(shuffle(prev).slice(0,3)).map((w,i)=>({w,d:i%2===0}));
  const total=qs.length; let i=0, right=0;
  sess.bossTotal=total;
  function next(){
    if(i>=total){ sess.bossRight=right; nextStep(); return; }
    const q=qs[i++];
    app.innerHTML=topbar(`Boss Round (${i} of ${total})`)+`<div id="qq"></div>`;
    mcq(document.getElementById("qq"),q.w,q.d,prev.concat(cur),(ok)=>{ if(ok)right++; next(); },true);
    window.scrollTo(0,0);
  }
  next();
}

/* ---- finish ---- */
function finishLesson(){
  const L=sess.L;
  const frac=sess.bossTotal?sess.bossRight/sess.bossTotal:1;
  let stars=1;
  if(sess.mistakes===0&&frac===1) stars=3;
  else if(sess.mistakes<=3&&frac>=0.75) stars=2;
  const bonus=stars*25;
  S.thawab+=bonus;
  if(!S.stars[L.n]||S.stars[L.n]<stars) S.stars[L.n]=stars;
  save(); header();
  const nxt=L.n<20?LESSONS[L.n]:null;
  const starHint=stars===3?"":`<p class="sub" style="margin-top:6px;font-size:12.5px">2 stars: finish with 3 mistakes or fewer · 3 stars: no mistakes and a perfect Boss Round. Replay the lesson any time to improve it.</p>`;
  app.innerHTML=`<div class="end">
    <div class="big">${"★".repeat(stars)}</div>
    <h2>Lesson ${L.n} complete!</h2>
    <div class="gain">You earned ${stars} of 3 stars</div>
    <div class="gain">+${sess.earned} thawab earned · +${bonus} star bonus</div>
    <p class="sub" style="margin-top:10px">${sess.mistakes===0?"No mistakes at all. May it be written in your scale of good deeds!":"Mistakes: "+sess.mistakes+". Those words will come back in Daily Revision."}</p>
    ${starHint}
    ${nxt?`<button class="btn" onclick="startLesson(${nxt.n})">Next: Lesson ${nxt.n} ➜</button>`:`<p class="gain">You have completed the whole journey!</p>`}
    <br><button class="btn ghost" onclick="renderMap()">Back to map</button>
  </div>`;
  window.scrollTo(0,0);
}

function startUnlockTest(n){

  <div class="end" style="margin-top:14px">
    <div class="hlabel" style="letter-spacing:2px">Skip ahead</div>
    <h2>Unlock Lesson ${n}?</h2>
    <p class="sub" style="margin-top:10px">Already studied lessons 1 to ${n-1} in the book, or played on another browser or device?<br><br>
    Answer 10 questions from those lessons. Get 8 or more right and every lesson up to Lesson ${n} unlocks. There is no penalty for trying, and you can retake it any time.</p>
    <button class="btn" onclick="runUnlockTest(${n})">Start the test</button><br>
    <button class="btn ghost" onclick="renderMap()">Not now</button>
  </div>`;
  window.scrollTo(0,0);
}
function runUnlockTest(n){
  const pool=poolUpTo(n-1);
  const qs=shuffle(pool).slice(0,10).map((w,i)=>({w,d:i%2===0}));
  sess={L:{n:"T",title:"Unlock test"},steps:[()=>{}],idx:1,mistakes:0,earned:0,streak:0};
  let i=0,right=0;
  function next(){
    if(i>=qs.length){
      if(right>=8){
        S.unlockedTo=Math.max(S.unlockedTo||1,n); save();
        app.innerHTML=`<div class="end"><div class="big" style="color:var(--good)">✓</div><h2>Unlocked!</h2>
        <div class="gain">${right} / ${qs.length} correct. Lessons up to ${n} are now open.</div>
        <button class="btn" onclick="startLesson(${n})">Play Lesson ${n} ➜</button><br>
        <button class="btn ghost" onclick="renderMap()">Back to map</button></div>`;
      }else{
        app.innerHTML=`<div class="end"><h2>Not yet</h2>
        <p class="sub" style="margin-top:10px">${right} / ${qs.length} correct; you need 8. Some earlier words still need practice, and they will make the later lessons much easier. Play a lesson or two, then try again whenever you like.</p>
        <button class="btn" onclick="renderMap()">Back to map</button></div>`;
      }
      window.scrollTo(0,0); return;
    }
    const q=qs[i++];
    app.innerHTML=`<div class="topline"><span class="back" onclick="renderMap()">← Back to Map</span><span></span></div>
      <div class="stage">Unlock test (${i} of ${qs.length})</div><div id="qq"></div>`;
    mcq(document.getElementById("qq"),q.w,q.d,pool,(ok)=>{if(ok)right++;next()},false);
    window.scrollTo(0,0);
  }
  next();
}

/* ================= DAILY REVISION ================= */
function startRevision(){
  // words from lessons the player completed (starred) or proved in an unlock test
  let pool=[];
  LESSONS.forEach(L=>{ if(S.stars[L.n] || L.n<(S.unlockedTo||1)) pool=pool.concat(L.words); });
  pool=pool.filter(w=>w[1]);
  if(!pool.length){ renderMap(); return; }
  const ranked=pool.slice().sort((a,b)=>{
    const sa=S.words[a[0]]||{c:0,w:0}, sb=S.words[b[0]]||{c:0,w:0};
    return (sb.w-sb.c)-(sa.w-sa.c) || (sa.c+sa.w)-(sb.c+sb.w);
  });
  const qs=shuffle(ranked.slice(0,15)).slice(0,10).map((w,i)=>({w,d:i%2===0}));
  sess={L:{n:"R",title:"Revision"},steps:[()=>{}],idx:1,mistakes:0,earned:0,streak:0};
  let i=0,right=0;
  function next(){
    if(i>=qs.length){
      const bonus=right===qs.length?30:0; if(bonus){S.thawab+=bonus;save();header();}
      app.innerHTML=`<div class="end"><div class="big" style="color:var(--good)">✓</div><h2>Revision complete</h2>
      <div class="gain">+${sess.earned+bonus} thawab ${bonus?"(perfect bonus!)":""}</div>
      <p class="sub" style="margin-top:10px">${right} / ${qs.length} correct. Reviewing a little every day is how the words settle into the heart.</p>
      <button class="btn" onclick="renderMap()">Back to map</button></div>`;
      return;
    }
    const q=qs[i++];
    app.innerHTML=`<div class="topline"><span class="back" onclick="renderMap()">← Back to Map</span><span></span></div>
      <div class="stage">Daily Revision (${i} of ${qs.length})</div><div id="qq"></div>`;
    mcq(document.getElementById("qq"),q.w,q.d,pool,(ok)=>{if(ok)right++;next()},false);
    window.scrollTo(0,0);
  }
  next();
}

renderMap();
</script>
